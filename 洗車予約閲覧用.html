<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="60">
<title>洗車状況 | まつおかまん</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh;}

/* ヘッダー */
.header{background:#1a5c2a;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-title{font-size:15px;font-weight:700;color:white;}
.header-sub{font-size:10px;color:#a0d4a8;}
.clock{font-size:12px;color:#a0d4a8;font-variant-numeric:tabular-nums;text-align:right;}
.auto-reload{font-size:10px;color:#6ab87a;text-align:right;}

.container{max-width:480px;margin:0 auto;padding:1rem;}

/* 現在の洗車状況 */
.now-card{border-radius:14px;padding:1.25rem;border:1px solid;margin-bottom:1rem;}
.now-card.idle{background:white;border-color:#c8dcc8;}
.now-card.washing{background:#E1F5EE;border-color:#5DCAA5;}
.now-label{font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:8px;}
.now-card.idle .now-label{color:#3d7a45;}
.now-card.washing .now-label{color:#085041;}
.now-big{font-size:20px;font-weight:700;margin-bottom:4px;}
.now-card.idle .now-big{color:#1a4a22;}
.now-card.washing .now-big{color:#085041;}
.now-sub{font-size:13px;color:#555;line-height:1.6;}
.now-card.washing .now-sub{color:#0C5C49;}
.now-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;}
.badge-dept{background:#E6F1FB;color:#0C447C;}
.badge-type{background:#E1F5EE;color:#085041;}
.badge-plate{background:#f0f0f0;color:#333;border:1px solid #ddd;}
.elapsed{font-size:22px;font-weight:700;color:#1D9E75;margin-top:8px;font-variant-numeric:tabular-nums;}

/* 次の予約 */
.next-card{background:#FFF8E1;border:1px solid #FFD54F;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;}
.next-label{font-size:11px;font-weight:700;color:#F57F17;letter-spacing:.05em;margin-bottom:6px;}
.next-big{font-size:18px;font-weight:700;color:#E65100;margin-bottom:4px;}
.next-sub{font-size:13px;color:#BF360C;}
.next-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.countdown{font-size:20px;font-weight:700;color:#E65100;margin-top:6px;}

/* 本日の予約一覧 */
.section-title{font-size:13px;font-weight:700;color:#3d7a45;margin-bottom:10px;letter-spacing:.03em;display:flex;align-items:center;gap:6px;}
.reservation-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem;}
.res-item{background:white;border:1px solid #d0dcd0;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;}
.res-item.current{background:#E1F5EE;border-color:#5DCAA5;}
.res-item.past{opacity:.45;}
.res-item.next-up{background:#FFF8E1;border-color:#FFD54F;}
.res-time{font-size:13px;font-weight:700;color:#1a4a22;width:52px;flex-shrink:0;}
.res-item.current .res-time{color:#085041;}
.res-item.next-up .res-time{color:#E65100;}
.res-item.past .res-time{color:#999;}
.res-info{flex:1;}
.res-name{font-size:13px;color:#1a1a1a;margin-bottom:3px;}
.res-badges{display:flex;gap:5px;flex-wrap:wrap;}
.res-status{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;flex-shrink:0;}
.status-current{background:#5DCAA5;color:white;}
.status-next{background:#FFD54F;color:#E65100;}
.status-waiting{background:#f0f0f0;color:#888;}
.status-past{background:#e0e0e0;color:#aaa;}

.empty-msg{text-align:center;color:#aaa;font-size:14px;padding:2rem 0;}

/* 統計 */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:white;border:1px solid #c8dcc8;border-radius:10px;padding:10px 12px;text-align:center;}
.stat-label{font-size:10px;color:#5a8a62;margin-bottom:3px;}
.stat-value{font-size:22px;font-weight:700;color:#1a4a22;}

/* 更新ボタン */
.refresh-btn{width:100%;padding:12px;background:#1a5c2a;border:none;border-radius:10px;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:1rem;}
.refresh-btn:active{background:#0F4A20;}

.footer{text-align:center;font-size:11px;color:#8aaa8a;padding:1rem 0 2rem;}
</style>
</head>

<script>
// ── 共有ストレージから予約データを読み込む ──
// このビューアは同じブラウザセッション内でデータを共有します
// 実運用では同一デバイス or LocalStorageを使う構成を推奨

const START_HOUR=6, END_HOUR=21, SLOT_MIN=15;

// デモ用: window.carwashDataがあればそこから読む（同一タブからの共有想定）
// 実際はlocalStorageから読み込む
const GAS_URL = "https://script.google.com/macros/s/AKfycbxgdnjo2sYes84yWET73lEtDhpjKHcm4foU7dF2m_ZGNJAQSRO_uN_VzOHy82HLxuKK4w/exec";

async function fetchFromGAS() {
  try {
    const res = await fetch(GAS_URL + '?action=getReservations');
    const json = await res.json();
    return json.data || {};
  } catch(e) { 
    // fallback to localStorage
    try { return JSON.parse(localStorage.getItem('carwash_reservations')||'{}'); } catch(e2) { return {}; }
  }
}

// 現在実際に洗車中の枠（担当者が開始ボタンを押した枠）を取得
async function fetchWashingStatus() {
  try {
    const res = await fetch(GAS_URL + '?action=getWashingStatus');
    const json = await res.json();
    return json.data || null;
  } catch(e) {
    return null;
  }
}


// XSS対策: HTML特殊文字をエスケープする関数
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getReservations() {
  try {
    const data = localStorage.getItem('carwash_reservations');
    return data ? JSON.parse(data) : {};
  } catch(e) { return {}; }
}

function localDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(d) { return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function addMinutes(t, mins) {
  const[h,m]=t.split(':').map(Number), tot=h*60+m+mins;
  return `${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function slotToMinutes(s) { const[h,m]=s.split(':').map(Number); return h*60+m; }

function formatMins(mins) {
  if(mins <= 0) return 'まもなく';
  if(mins < 60) return `あと ${mins} 分`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if(m === 0) return `あと ${h} 時間`;
  return `あと ${h} 時間 ${m} 分`;
}

function generateSlots() {
  const s=[];
  for(let h=START_HOUR;h<END_HOUR;h++)
    for(let m=0;m<60;m+=SLOT_MIN)
      s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  return s;
}

function getNowMins() {
  const n=new Date(); return n.getHours()*60+n.getMinutes();
}

function render() {
  const reservations = getReservations();
  const dk = localDateKey(new Date());
  const dayRes = reservations[dk] || {};
  const now = new Date();
  const nowMins = now.getHours()*60+now.getMinutes();
  const slots = generateSlots();

  // 本日の全予約スロット
  const allBooked = slots.filter(s => dayRes[s]).sort((a,b)=>slotToMinutes(a)-slotToMinutes(b));

  // 実際に担当者が「開始」を押している枠（進行中ステータス）を優先的に「洗車中」とする
  let currentSlot = null;
  if (currentWashingStatus && currentWashingStatus.date === dk && currentWashingStatus.slot && dayRes[currentWashingStatus.slot]) {
    currentSlot = currentWashingStatus.slot;
  }
  const pastBooked = allBooked.filter(s => s !== currentSlot && slotToMinutes(s)+SLOT_MIN <= nowMins);
  const upcomingBooked = allBooked.filter(s => s !== currentSlot && slotToMinutes(s) > nowMins);
  const nextSlot = upcomingBooked[0] || null;

  // 統計
  document.getElementById('stat-total').textContent = allBooked.length;
  document.getElementById('stat-done').textContent = pastBooked.length;
  document.getElementById('stat-remain').textContent = upcomingBooked.length + (currentSlot ? 1 : 0);

  // 現在の洗車状況
  const nowCard = document.getElementById('now-card');
  const nowLabel = document.getElementById('now-label');
  const nowBig = document.getElementById('now-big');
  const nowSub = document.getElementById('now-sub');
  const nowMeta = document.getElementById('now-meta');
  const elapsed = document.getElementById('elapsed');

  if (currentSlot) {
    const r = dayRes[currentSlot];
    nowCard.className = 'now-card washing';
    nowLabel.textContent = '🚿 洗車中';
    nowBig.textContent = `${currentSlot}〜${addMinutes(currentSlot,15)}`;
    nowSub.textContent = `${esc(r.name)}さん（${esc(r.dept)}）`;
    nowMeta.innerHTML = `<span class="badge badge-dept">${esc(r.dept)}</span><span class="badge badge-type">${esc(r.type)}</span><span class="badge badge-plate">${esc(r.plate)}</span>${r.trailerPlate?`<span class="badge badge-plate">${esc(r.trailerPlate)}</span>`:''}`;
    let elapsedMins;
    if (currentWashingStatus && currentWashingStatus.startedAt) {
      const startedDate = new Date(currentWashingStatus.startedAt);
      elapsedMins = Math.floor((now - startedDate) / 60000);
    } else {
      elapsedMins = nowMins - slotToMinutes(currentSlot);
    }
    elapsed.style.display = 'block';
    elapsed.textContent = `経過 ${elapsedMins}分`;
  } else if (upcomingBooked.length > 0 || pastBooked.length > 0) {
    nowCard.className = 'now-card idle';
    nowLabel.textContent = '⏳ 待機中';
    nowBig.textContent = '現在洗車中の車両なし';
    nowSub.textContent = nextSlot ? `次の予約まで待機中です` : '本日の残り予約はありません';
    nowMeta.innerHTML = '';
    elapsed.style.display = 'none';
  } else {
    nowCard.className = 'now-card idle';
    nowLabel.textContent = '🕐 待機中';
    nowBig.textContent = '現在洗車中の車両なし';
    nowSub.textContent = '予約が入ると表示されます';
    nowMeta.innerHTML = '';
    elapsed.style.display = 'none';
  }

  // 次の予約
  const nextCard = document.getElementById('next-card');
  if (nextSlot) {
    const r = dayRes[nextSlot];
    nextCard.style.display = 'block';
    document.getElementById('next-big').textContent = `${nextSlot}〜${addMinutes(nextSlot,15)}`;
    document.getElementById('next-sub').textContent = `${esc(r.name)}さん（${esc(r.dept)}）`;
    document.getElementById('next-meta').innerHTML = `<span class="badge badge-dept">${esc(r.dept)}</span><span class="badge badge-type">${esc(r.type)}</span><span class="badge badge-plate">${esc(r.plate)}</span>`;
    const mins = slotToMinutes(nextSlot) - nowMins;
    document.getElementById('countdown').textContent = formatMins(mins);
  } else {
    nextCard.style.display = 'none';
  }

  // 予約一覧
  const list = document.getElementById('reservation-list');
  if (!allBooked.length) {
    list.innerHTML = '<div class="empty-msg">本日の予約はありません</div>';
    return;
  }
  list.innerHTML = allBooked.map(slot => {
    const r = dayRes[slot];
    const isCurrent = slot === currentSlot;
    const isPast = slotToMinutes(slot)+SLOT_MIN <= nowMins;
    const isNext = slot === nextSlot;
    let cls = 'res-item';
    let statusHtml = '';
    if (isCurrent) { cls += ' current'; statusHtml = '<span class="res-status status-current">洗車中</span>'; }
    else if (isPast) { cls += ' past'; statusHtml = '<span class="res-status status-past">完了</span>'; }
    else if (isNext) { cls += ' next-up'; statusHtml = '<span class="res-status status-next">次</span>'; }
    else { statusHtml = '<span class="res-status status-waiting">待機</span>'; }
    return `<div class="${cls}">
      <div class="res-time">${slot}</div>
      <div class="res-info">
        <div class="res-name">${esc(r.name)}　<span style="font-size:11px;color:#888;">${esc(r.dept)}</span></div>
        <div class="res-badges">
          <span class="badge badge-type" style="font-size:10px">${esc(r.type)}</span>
          <span class="badge badge-plate" style="font-size:10px">${esc(r.plate)}</span>
          ${r.trailerPlate?`<span class="badge badge-plate" style="font-size:10px">${esc(r.trailerPlate)}</span>`:''}
        </div>
      </div>
      ${statusHtml}
    </div>`;
  }).join('');
}

// 時計
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

let currentWashingStatus = null;

async function renderFromGAS() {
  const data = await fetchFromGAS();
  if (data) {
    try { localStorage.setItem('carwash_reservations', JSON.stringify(data)); } catch(e) {}
  }
  currentWashingStatus = await fetchWashingStatus();
  render();
}

renderFromGAS();
updateClock();
setInterval(updateClock, 1000);
setInterval(renderFromGAS, 15000); // 15秒ごとにGASから再取得
</script>
